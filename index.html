<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多益練習工具</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter','Noto Sans TC',sans-serif; background:#0f1117; color:#e8eaf0; min-height:100vh; padding:0 0 60px; font-size:17px; }

  /* TOP NAV */
  .top-bar { background:#0f1117; border-bottom:1px solid #1f2937; padding:16px; text-align:center; }
  .top-bar h1 { font-size:22px; font-weight:700; color:#fff; margin-bottom:10px; }
  .main-tabs { display:flex; justify-content:center; gap:6px; flex-wrap:wrap; }
  .main-tab { padding:10px 20px; border-radius:8px; border:1px solid #1f2937; background:#1a1d27; color:#9ca3af; font-size:16px; font-weight:500; cursor:pointer; transition:all 0.15s; }
  .main-tab.active { background:#3b82f6; border-color:#3b82f6; color:#fff; }

  .page { display:none; padding:16px; }
  .page.active { display:block; }

  /* SIDEBAR LAYOUT */
  .two-col { display:flex; gap:16px; align-items:flex-start; }
  .sidebar {
    width:180px; min-width:160px; background:#1a1d27;
    border:1px solid #1f2937; border-radius:12px;
    padding:12px 8px; position:sticky; top:90px;
    max-height: calc(100vh - 110px); overflow-y:auto;
  }
  .sidebar::-webkit-scrollbar { width:4px; }
  .sidebar::-webkit-scrollbar-thumb { background:#374151; border-radius:4px; }
  .main-content { flex:1; min-width:0; }

  /* SIDEBAR MENU */
  .sb-section { margin-bottom:12px; }
  .sb-week {
    font-size:14px; font-weight:700; color:#6b7280;
    letter-spacing:1px; text-transform:uppercase;
    padding:4px 8px; margin-bottom:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:space-between;
    border-radius:6px; transition:background 0.15s;
  }
  .sb-week:hover { background:#1f2937; }
  .sb-week .arrow { font-size:9px; transition:transform 0.2s; }
  .sb-week.open .arrow { transform:rotate(180deg); }
  .sb-days { display:none; }
  .sb-week.open + .sb-days { display:block; }
  .sb-day {
    font-size:14px; color:#6b7280; padding:5px 8px 5px 16px;
    cursor:pointer; border-radius:6px; transition:all 0.15s;
    display:flex; align-items:center; gap:6px;
  }
  .sb-day:hover { background:#1f2937; color:#9ca3af; }
  .sb-day.active { background:#1e3a5f; color:#60a5fa; font-weight:600; }
  .sb-day .dot { width:6px; height:6px; border-radius:50%; background:#374151; flex-shrink:0; }
  .sb-day.active .dot { background:#3b82f6; }
  .sb-day.done .dot { background:#10b981; }

  /* SPEED */
  .speed-row { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
  .speed-label { font-size:15px; color:#9ca3af; }
  .speed-btn { padding:8px 16px; border-radius:20px; border:1px solid #374151; background:#1a1d27; color:#9ca3af; font-size:15px; cursor:pointer; transition:all 0.15s; }
  .speed-btn.active { background:#1e3a5f; border-color:#3b82f6; color:#60a5fa; font-weight:600; }

  /* WORD CARDS */
  .sec-label { font-size:14px; font-weight:700; color:#6b7280; letter-spacing:1px; text-transform:uppercase; margin-bottom:16px; }
  .word-list { display:flex; flex-direction:column; gap:8px; }
  .word-item { background:#1a1d27; border:1px solid #1f2937; border-radius:12px; overflow:hidden; transition:border-color 0.15s; }
  .word-item.open { border-color:#3b82f6; }
  .word-item.playing-word { border-color:#10b981; }
  .word-header { display:flex; align-items:stretch; gap:0; padding:0; user-select:none; overflow:hidden; }
  .word-header:hover { background:#1e2433; }
  /* 文字區：點一下播放+展開，點兩下收起 */
  .word-main { flex:1; min-width:0; padding:16px 14px; cursor:pointer; }
  .word-en { font-size:24px; font-weight:700; color:#f3f4f6; margin-bottom:4px; }
  .word-phonetic { font-size:14px; color:#6366f1; margin:4px 0; font-style:italic; }
  .word-meta { font-size:15px; color:#6b7280; margin-top:2px; }
  .word-pos { font-style:italic; color:#4b5563; margin-right:6px; }
  /* 播放區在右（大按鈕，右撇子好按） */
  .word-play-zone { display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; border-left:1px solid #1f2937; }
  .speak-btn { width:72px; height:80px; min-width:72px; border-radius:0 12px 12px 0; background:#1f2937; display:flex; align-items:center; justify-content:center; font-size:26px; cursor:pointer; border:none; color:#9ca3af; transition:background 0.15s; }
  .speak-btn:hover { background:#374151; }
  .word-item.playing-word .speak-btn { background:#10b981; color:#fff; }
  .word-example { display:none; padding:14px 16px 18px 20px; border-top:1px solid #1f2937; }
  .word-item.open .word-example { display:block; }
  .example-en { font-size:15px; color:#d1d5db; margin-bottom:8px; line-height:1.7; cursor:pointer; display:flex; align-items:center; gap:10px; }
  .example-en:hover { color:#60a5fa; }
  .example-en.playing-ex { color:#10b981; }
  .ex-speak { font-size:13px; background:#1f2937; border-radius:10px; padding:5px 12px; color:#6b7280; white-space:nowrap; flex-shrink:0; }
  .example-en.playing-ex .ex-speak { background:#10b981; color:#fff; }
  .example-zh { font-size:14px; color:#4b5563; line-height:1.5; }

  /* SENTENCES */
  .play-all-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:14px; background:#1e3a5f; border:1px solid #3b82f6; border-radius:10px; color:#60a5fa; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:14px; transition:all 0.15s; }
  .play-all-btn:hover { background:#1d4ed8; color:#fff; }
  .sentence-list { display:flex; flex-direction:column; gap:8px; }
  .sentence-card { background:#1a1d27; border:1px solid #1f2937; border-radius:12px; padding:12px 14px; cursor:pointer; transition:all 0.15s; display:flex; align-items:flex-start; gap:10px; position:relative; overflow:hidden; }
  .sentence-card:hover { border-color:#3b82f6; background:#1e2433; }
  .sentence-card.playing { border-color:#10b981; background:#0d2420; }
  .sentence-card.playing::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:#10b981; animation:prog 2s ease-in-out infinite; }
  @keyframes prog { 0%{transform:scaleX(0);transform-origin:left} 50%{transform:scaleX(1);transform-origin:left} 100%{transform:scaleX(0);transform-origin:right} }
  .s-play-btn { width:40px; height:40px; min-width:40px; background:#1f2937; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:15px; color:#9ca3af; }
  .sentence-card.playing .s-play-btn { background:#10b981; color:#fff; }
  .s-en { font-size:17px; color:#e8eaf0; font-weight:500; margin-bottom:4px; line-height:1.5; }
  .s-zh { font-size:15px; color:#6b7280; }

  /* QUIZ */
  .quiz-box { background:#1a1d27; border:1px solid #1f2937; border-radius:14px; padding:16px; margin-bottom:12px; }
  .quiz-num { font-size:14px; color:#6b7280; margin-bottom:8px; font-weight:600; letter-spacing:1px; }
  .quiz-q { font-size:18px; color:#f3f4f6; font-weight:600; margin-bottom:16px; line-height:1.6; }
  .quiz-q .blank { color:#60a5fa; border-bottom:2px solid #3b82f6; padding:0 5px; }
  .options { display:flex; flex-direction:column; gap:7px; }
  .opt { padding:13px 16px; border-radius:10px; border:1px solid #2d3748; background:#0f1117; color:#d1d5db; font-size:16px; cursor:pointer; transition:all 0.15s; text-align:left; }
  .opt:hover:not(:disabled) { border-color:#3b82f6; background:#1e2433; color:#fff; }
  .opt.correct { border-color:#10b981; background:#0d2420; color:#10b981; font-weight:600; }
  .opt.wrong { border-color:#ef4444; background:#2d1212; color:#ef4444; }
  .opt:disabled { cursor:default; }
  .quiz-feedback { margin-top:12px; padding:14px 16px; border-radius:10px; font-size:15px; line-height:1.7; display:none; }
  .quiz-feedback.show { display:block; }
  .quiz-feedback.ok { background:#0d2420; color:#6ee7b7; border:1px solid #10b981; }
  .quiz-feedback.bad { background:#2d1212; color:#fca5a5; border:1px solid #ef4444; }
  .quiz-score { text-align:center; padding:20px; background:#1a1d27; border:1px solid #1f2937; border-radius:14px; margin-bottom:12px; display:none; }
  .score-num { font-size:40px; font-weight:700; color:#60a5fa; }
  .score-label { font-size:16px; color:#6b7280; margin-top:6px; }
  .retry-btn { margin-top:14px; padding:12px 28px; background:#3b82f6; border:none; border-radius:10px; color:#fff; font-size:16px; font-weight:600; cursor:pointer; }

  /* LISTENING */
  .listen-box { background:#1a1d27; border:1px solid #2563eb; border-radius:14px; padding:16px; margin-bottom:14px; }
  .listen-title { font-size:14px; color:#60a5fa; font-weight:700; letter-spacing:1px; margin-bottom:10px; text-transform:uppercase; }
  .listen-play-btn { display:flex; align-items:center; gap:8px; padding:12px 18px; background:#1e3a5f; border:1px solid #3b82f6; border-radius:10px; color:#60a5fa; font-size:16px; font-weight:600; cursor:pointer; margin-bottom:10px; transition:all 0.15s; width:fit-content; }
  .listen-play-btn:hover { background:#1d4ed8; color:#fff; }
  .listen-play-btn.playing { background:#0d2420; border-color:#10b981; color:#10b981; }
  .listen-hint { font-size:14px; color:#4b5563; margin-bottom:10px; }
  .show-script-btn { padding:8px 16px; background:transparent; border:1px solid #374151; border-radius:8px; color:#9ca3af; font-size:15px; cursor:pointer; }
  .show-script-btn:hover { border-color:#6b7280; color:#9ca3af; }
  .script-text { display:none; margin-top:12px; padding:16px; background:#0f1117; border-radius:8px; font-size:16px; color:#9ca3af; line-height:2.0; border:1px solid #1f2937; }
  .script-text.show { display:block; }
  .script-speaker { color:#60a5fa; font-weight:600; }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:40px 20px; color:#374151; }
  .empty-state .icon { font-size:40px; margin-bottom:12px; }
  .empty-state p { font-size:14px; }

  /* MOBILE */
  /* 回到頂部按鈕 */
  #back-to-top {
    position: fixed;
    bottom: 28px;
    right: 24px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: #3b82f6;
    border: none;
    color: #fff;
    font-size: 22px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 16px rgba(59,130,246,0.4);
    transition: all 0.2s;
    z-index: 999;
  }
  #back-to-top:hover { background: #2563eb; transform: translateY(-2px); }
  #back-to-top.show { display: flex; }

  @media(max-width:600px) {
    .two-col { flex-direction:column; }
    .sidebar { width:100%; position:static; max-height:none; display:flex; flex-wrap:wrap; gap:6px; padding:8px; }
    .sb-section { margin:0; }
    .sb-week { display:none; }
    .sb-days { display:flex !important; flex-wrap:wrap; gap:4px; }
    .sb-day { padding:5px 10px; border:1px solid #1f2937; border-radius:20px; }
  }
</style>
</head>
<body>

<div class="top-bar">
  <h1>🎯 TOEIC 每日練習</h1>
  <div class="main-tabs">
    <button class="main-tab active" onclick="showPage('vocab',this)">📚 單字發音</button>
    <button class="main-tab" onclick="showPage('listening',this)">🎧 聽力測驗</button>
    <button class="main-tab" onclick="showPage('grammar',this)">📝 文法測驗</button>
  </div>
  <div class="speed-row" style="margin-top:10px;margin-bottom:0;">
    <span class="speed-label">播放速度：</span>
    <button class="speed-btn" id="spd-slow" onclick="setSpeed(0.7,this)">慢速</button>
    <button class="speed-btn active" id="spd-normal" onclick="setSpeed(1.0,this)">正常</button>
    <button class="speed-btn" id="spd-fast" onclick="setSpeed(1.3,this)">快速</button>
  </div>
</div>

<!-- VOCAB PAGE -->
<div id="vocab" class="page active">
  <div class="two-col">
    <div class="sidebar" id="vocab-sidebar"></div>
    <div class="main-content" id="vocab-main"></div>
  </div>
</div>

<!-- LISTENING PAGE -->
<div id="listening" class="page">
  <div class="two-col">
    <div class="sidebar" id="listen-sidebar"></div>
    <div class="main-content" id="listen-main"></div>
  </div>
</div>

<!-- GRAMMAR PAGE -->
<div id="grammar" class="page">
  <div class="two-col">
    <div class="sidebar" id="grammar-sidebar"></div>
    <div class="main-content" id="grammar-main"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
let speed = 1.0;
let activeCard = null, activeExEl = null;
// ── 靜音音訊流：讓瀏覽器音訊通道保持開啟，避免硬體休眠 ──
function startSilentAudioStream() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const buffer = ctx.createBuffer(1, ctx.sampleRate, ctx.sampleRate);
    // buffer 全部填 0 = 完全靜音，人耳聽不到
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    const gain = ctx.createGain();
    gain.gain.value = 0.0001; // 極弱訊號，不影響其他聲音
    source.connect(gain);
    gain.connect(ctx.destination);
    source.loop = true; // 持續循環，永遠不停
    source.start(0);
    // 第一次使用者互動後解鎖 AudioContext
    document.addEventListener('click', () => {
      if (ctx.state === 'suspended') ctx.resume();
    }, { once: true });
  } catch(e) {
    console.log('Silent audio stream not supported:', e);
  }
}

// ── DATA ──────────────────────────────────────────────────────
// 資料已移至 data.js

// ── SPEECH ──────────────────────────────────────────────────
function setSpeed(s, btn) {
  speed = parseFloat(s);
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // 立刻播一個測試音讓使用者確認速度
  speechSynthesis.cancel();
  setTimeout(() => {
    const test = new SpeechSynthesisUtterance('test');
    test.lang = 'en-US';
    test.rate = speed;
    test.pitch = 1.0;
    test.volume = 1.0;
    speechSynthesis.speak(test);
  }, 100);
}
function stopAll() {
  speechSynthesis.cancel();
  if (activeCard) { activeCard.classList.remove('playing','playing-word'); activeCard = null; }
  if (activeExEl) { activeExEl.classList.remove('playing-ex'); activeExEl = null; }
}
function speakText(text, onEnd) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = parseFloat(speed) || 1.0;
  u.pitch = 1.0;
  if (onEnd) u.onend = onEnd;
  // 短暫延遲讓 cancel() 完全生效再播放
  setTimeout(() => speechSynthesis.speak(u), 50);
}
function speakScript(lines, idx, btn) {
  if (idx>=lines.length) { btn.classList.remove('playing'); btn.textContent='▶ 播放對話'; return; }
  const u = new SpeechSynthesisUtterance(lines[idx].text);
  u.lang = 'en-US';
  u.rate = parseFloat(speed) || 1.0;
  u.pitch = 1.0;
  u.onend = () => setTimeout(() => speakScript(lines, idx+1, btn), 400);
  speechSynthesis.speak(u);
}

// ── SIDEBAR BUILDER ──────────────────────────────────────────
function buildSidebar(containerId, data, onSelect, type) {
  const sb = document.getElementById(containerId);
  sb.innerHTML = '';
  let firstDay = null;
  // 強制排序確保週和天的順序正確
  const sortedWeeks = Object.keys(data).sort();
  sortedWeeks.forEach((week, wi) => {
    const sec = document.createElement('div');
    sec.className = 'sb-section';
    const wBtn = document.createElement('div');
    wBtn.className = 'sb-week open';
    wBtn.innerHTML = `<span>${week}</span><span class="arrow">▼</span>`;
    const days = document.createElement('div');
    days.className = 'sb-days';
    // 排序天的順序
    const sortedDays = Object.keys(data[week]).sort((a,b) => {
      const numA = parseInt(a.match(/\d+/) || [0]);
      const numB = parseInt(b.match(/\d+/) || [0]);
      return numA - numB;
    });
    sortedDays.forEach((day, di) => {
      const dBtn = document.createElement('div');
      dBtn.className = 'sb-day';
      dBtn.innerHTML = `<span class="dot"></span>${day}`;
      dBtn.dataset.week = week;
      dBtn.dataset.day = day;
      dBtn.addEventListener('click', () => {
        sb.querySelectorAll('.sb-day').forEach(b=>b.classList.remove('active'));
        dBtn.classList.add('active');
        onSelect(week, day, data[week][day]);
      });
      if (!firstDay) firstDay = dBtn;
      days.appendChild(dBtn);
    });
    wBtn.addEventListener('click', () => {
      wBtn.classList.toggle('open');
      days.style.display = wBtn.classList.contains('open') ? 'block' : 'none';
    });
    sec.appendChild(wBtn); sec.appendChild(days);
    sb.appendChild(sec);
  });
  if (firstDay) firstDay.click();
}

// ── VOCAB ────────────────────────────────────────────────────
function renderVocab(week, day, data) {
  const main = document.getElementById('vocab-main');
  main.innerHTML = `<p class="sec-label">${week} · ${day}</p>`;
  const list = document.createElement('div');
  list.className = 'word-list';
  data.words.forEach(w => {
    const item = document.createElement('div');
    item.className = 'word-item';
    const header = document.createElement('div');
    header.className = 'word-header';
    header.innerHTML = `
      <div class="word-main">
        <div class="word-en">${w.en}</div>
        <div class="word-phonetic">${w.ph}</div>
        <div class="word-meta"><span class="word-pos">${w.pos}</span>${w.zh}</div>
      </div>
      <div class="word-play-zone"><button class="speak-btn">🔊</button></div>`;
    const example = document.createElement('div');
    example.className = 'word-example';
    example.innerHTML = `
      <div class="example-en"><span class="ex-speak">▶ 例句</span>${w.ex}</div>
      <div class="example-zh">${w.exZh}</div>`;
    // 文字區：點一下播放+展開，再點一下收起
    header.querySelector('.word-main').addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = item.classList.contains('open');
      if (isOpen) {
        // 已展開 → 收起
        item.classList.remove('open');
        stopAll();
      } else {
        // 未展開 → 播放 + 展開
        document.querySelectorAll('.word-item.open').forEach(el => el.classList.remove('open'));
        item.classList.add('open');
        stopAll();
        item.classList.add('playing-word'); activeCard=item;
        speakText(w.en,()=>{item.classList.remove('playing-word');activeCard=null;});
      }
    });
    // 右側🔊大按鈕：只播放，不影響展開狀態，可重複按
    header.querySelector('.word-play-zone').addEventListener('click', e => {
      e.stopPropagation();
      stopAll();
      item.classList.add('playing-word'); activeCard=item;
      speakText(w.en,()=>{item.classList.remove('playing-word');activeCard=null;});
    });
    // 例句：點一下播放，再點一下停止
    example.querySelector('.example-en').addEventListener('click', e => {
      e.stopPropagation();
      const el=example.querySelector('.example-en');
      if(el.classList.contains('playing-ex')){
        stopAll(); return;
      }
      stopAll();
      el.classList.add('playing-ex'); activeExEl=el;
      speakText(w.ex,()=>{el.classList.remove('playing-ex');activeExEl=null;});
    });
    item.appendChild(header); item.appendChild(example); list.appendChild(item);
  });
  main.appendChild(list);

  if (data.sentences && data.sentences.length > 0) {
    const divider = document.createElement('hr');
    divider.style.cssText='border:none;border-top:1px solid #1f2937;margin:20px 0';
    main.appendChild(divider);
    const sLabel = document.createElement('p');
    sLabel.className='sec-label'; sLabel.textContent='口說跟讀例句';
    main.appendChild(sLabel);
    const playAllBtn = document.createElement('button');
    playAllBtn.className='play-all-btn'; playAllBtn.textContent='▶ 全部播放（跟著唸）';
    let paActive=false, paIdx=0;
    const sentList = document.createElement('div');
    sentList.className='sentence-list';
    const sentCards = [];
    data.sentences.forEach(s => {
      const card=document.createElement('div');
      card.className='sentence-card';
      card.innerHTML=`<div class="s-play-btn">▶</div><div><div class="s-en">${s.en}</div><div class="s-zh">${s.zh}</div></div>`;
      card.addEventListener('click',()=>{
        stopAll(); card.classList.add('playing'); activeCard=card;
        speakText(s.en,()=>{card.classList.remove('playing');activeCard=null;});
      });
      sentCards.push({card,s});
      sentList.appendChild(card);
    });
    function playNext() {
      if (!paActive||paIdx>=sentCards.length){paActive=false;playAllBtn.textContent='▶ 全部播放（跟著唸）';return;}
      const {card,s}=sentCards[paIdx];
      card.classList.add('playing'); activeCard=card;
      const u=new SpeechSynthesisUtterance(s.en);
      u.lang='en-US';u.rate=speed;
      u.onend=()=>{card.classList.remove('playing');paIdx++;setTimeout(playNext,700);};
      speechSynthesis.speak(u);
    }
    playAllBtn.addEventListener('click',()=>{
      if(paActive){stopAll();paActive=false;playAllBtn.textContent='▶ 全部播放（跟著唸）';return;}
      stopAll();paActive=true;paIdx=0;playAllBtn.textContent='⏹ 停止播放';playNext();
    });
    main.appendChild(playAllBtn); main.appendChild(sentList);
  }
}

// ── LISTENING ────────────────────────────────────────────────
const listenAnswers = {};
function renderListening(week, day, data) {
  const main = document.getElementById('listen-main');
  main.innerHTML = `<p class="sec-label">${week} · ${day}</p>`;
  const key = week+day;
  const scriptLines = data.script.map(l=>`<div><span class="script-speaker">${l.speaker}：</span>${l.text}</div>`).join('');
  const listenBox = document.createElement('div');
  listenBox.className='listen-box';
  listenBox.innerHTML=`
    <div class="listen-title">🎧 聽力對話</div>
    <button class="listen-play-btn" id="lplay-btn">▶ 播放對話</button>
    <div class="listen-hint">💡 建議先聽2遍再作答</div>
    <button class="show-script-btn">顯示對話原文</button>
    <div class="script-text">${scriptLines}</div>`;
  const playBtn=listenBox.querySelector('#lplay-btn');
  playBtn.addEventListener('click',()=>{
    stopAll(); playBtn.classList.add('playing'); playBtn.textContent='🔊 播放中...';
    speakScript(data.script,0,playBtn);
  });
  listenBox.querySelector('.show-script-btn').addEventListener('click',function(){
    const st=listenBox.querySelector('.script-text');
    st.classList.toggle('show');
    this.textContent=st.classList.contains('show')?'隱藏對話原文':'顯示對話原文';
  });
  main.appendChild(listenBox);

  data.questions.forEach((q,qi)=>{
    const box=document.createElement('div'); box.className='quiz-box';
    const fb=document.createElement('div'); fb.className='quiz-feedback';
    box.innerHTML=`<div class="quiz-num">問題 ${qi+1}</div><div class="quiz-q">${q.q}</div>`;
    const opts=document.createElement('div'); opts.className='options';
    q.opts.forEach((o,oi)=>{
      const btn=document.createElement('button'); btn.className='opt'; btn.textContent=o;
      const aKey=key+'-'+qi;
      if(listenAnswers[aKey]!==undefined){
        btn.disabled=true;
        if(oi===q.ans)btn.classList.add('correct');
        else if(oi===listenAnswers[aKey])btn.classList.add('wrong');
      }
      btn.addEventListener('click',()=>{
        if(listenAnswers[aKey]!==undefined)return;
        listenAnswers[aKey]=oi;
        opts.querySelectorAll('.opt').forEach((b,i)=>{
          b.disabled=true;
          if(i===q.ans)b.classList.add('correct');
          else if(i===oi)b.classList.add('wrong');
        });
        fb.className='quiz-feedback show '+(oi===q.ans?'ok':'bad');
        fb.innerHTML=(oi===q.ans?'✅ 答對了！<br><br>':'❌ 答錯了。<br><br>')+q.exp.replace(/\\n/g,'<br>');
      });
      opts.appendChild(btn);
    });
    if(listenAnswers[key+'-'+qi]!==undefined){
      fb.className='quiz-feedback show '+(listenAnswers[key+'-'+qi]===q.ans?'ok':'bad');
      fb.innerHTML=(listenAnswers[key+'-'+qi]===q.ans?'✅ 答對了！':'❌ 答錯了。')+' '+q.exp;
    }
    box.appendChild(opts); box.appendChild(fb); main.appendChild(box);
  });
}

// ── PAGE NAV ─────────────────────────────────────────────────
function showPage(id, btn) {
  stopAll();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active'); btn.classList.add('active');
}

buildSidebar('vocab-sidebar',   vocabData,    renderVocab,     'v');
